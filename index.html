    <style>
      /* Prevent white flash on load */
      html, body { background: #0d1017; margin: 0; padding: 0; }

      /* ── Splash v61 — dark, minimal, text only ── */
      #splash {
        position: fixed; inset: 0; z-index: 99999;
        background: rgba(5,7,15,1);
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 14px;
        transition: opacity 350ms ease;
      }
      #splash.out { opacity: 0; pointer-events: none; }

      .sp-word {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 28px; font-weight: 800;
        letter-spacing: 0.12em;
        color: rgba(255,255,255,0.82);
        user-select: none;
        opacity: 0;
        animation: sp-in 400ms ease 80ms forwards;
      }

      .sp-sub {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 9px; font-weight: 600;
        letter-spacing: 0.22em;
        color: rgba(255,255,255,0.20);
        text-transform: uppercase;
        user-select: none;
        opacity: 0;
        animation: sp-in 400ms ease 220ms forwards;
      }

      .sp-bar {
        width: 0; height: 1px;
        background: rgba(255,255,255,0.12);
        animation: sp-bar 2200ms ease 300ms forwards;
      }

      @keyframes sp-in  { to { opacity: 1; } }
      @keyframes sp-bar { to { width: 120px; } }
    </style>
  </head>
  <body>
    <!-- Splash -->
    <div id="splash">
      <span class="sp-word">ZERØ</span>
      <div class="sp-bar"></div>
      <span class="sp-sub">Order Book</span>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // v61: Splash hides when app signals data ready (bids+ticker loaded)
      // min 1500ms agar user sempat baca ZERØ, max 4000ms fallback
      var splashMinMs = 1500;
      var splashStart = Date.now();
      var splashDone  = false;

      function hideSplash() {
        if (splashDone) return;
        splashDone = true;
        var s = document.getElementById('splash');
        if (!s) return;
        s.classList.add('out');
        setTimeout(function() { s && s.remove(); }, 380);
      }

      // Called from Index.tsx once bids+ticker are populated
      window.__splashDone = function() {
        var elapsed = Date.now() - splashStart;
        var wait    = Math.max(0, splashMinMs - elapsed);
        setTimeout(hideSplash, wait);
      };

      // Hard fallback: 4s max no matter what
      setTimeout(hideSplash, 4000);
    </script>
  </body>

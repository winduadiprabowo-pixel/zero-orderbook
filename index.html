    <style>
      /* Prevent white flash on load */
      html, body { background: #0d1017; margin: 0; padding: 0; }

      /* ── Splash ── */
      #splash {
        position: fixed; inset: 0; z-index: 99999;
        background: rgba(10,13,20,1);
        display: flex; align-items: center; justify-content: center;
        transition: opacity 420ms ease;
      }
      #splash.out { opacity: 0; pointer-events: none; }

      .sp-wrap {
        position: relative;
        width: 96px; height: 96px;
        display: flex; align-items: center; justify-content: center;
      }

      .sp-glow {
        position: absolute; inset: -16px; border-radius: 50%;
        background: radial-gradient(ellipse at 50% 50%,
          rgba(242,142,44,0.10) 0%, transparent 65%);
        opacity: 0; animation: sp-fade 600ms ease 100ms forwards;
      }

      .sp-ring {
        position: absolute; inset: 0;
        opacity: 0;
        animation: sp-fade 300ms ease forwards, sp-spin 2.6s linear infinite;
      }

      .sp-mark {
        position: relative; z-index: 2;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 34px; font-weight: 800;
        color: rgba(242,142,44,1);
        line-height: 1;
        text-shadow: 0 0 28px rgba(242,142,44,0.45);
        user-select: none;
        opacity: 0; transform: scale(0.80);
        animation: sp-pop 420ms cubic-bezier(0.34,1.45,0.64,1) 120ms forwards;
      }

      @keyframes sp-spin { to { transform: rotate(360deg); } }
      @keyframes sp-fade { to { opacity: 1; } }
      @keyframes sp-pop  { to { opacity: 1; transform: scale(1); } }
    </style>
  </head>
  <body>
    <!-- Splash -->
    <div id="splash">
      <div class="sp-wrap">
        <div class="sp-glow"></div>
        <svg class="sp-ring" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="48" cy="48" r="43" stroke="rgba(255,255,255,0.045)" stroke-width="1.2"/>
          <circle cx="48" cy="48" r="43" stroke="rgba(242,142,44,0.88)" stroke-width="1.4"
            stroke-linecap="round" stroke-dasharray="28 242"/>
          <circle cx="48" cy="5" r="2.2" fill="rgba(242,142,44,0.95)"/>
        </svg>
        <span class="sp-mark">Ø</span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide splash once React app is ready
      // main.tsx calls window.__splashDone() after first render
      window.__splashDone = function() {
        var s = document.getElementById('splash');
        if (!s) return;
        s.classList.add('out');
        setTimeout(function() { s.remove(); }, 450);
      };
      // Fallback: force hide after 3s max
      setTimeout(function() {
        if (window.__splashDone) window.__splashDone();
      }, 3000);
    </script>
  </body>
